<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jazz Scale Chord Trainer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toast"></div>
<div id="app">
  <header>
    <h1>Jazz Scale Chord Trainer</h1>
    <div id="midi-status" class="disconnected">No MIDI device</div>
  </header>

  <div id="controls-row">
    <section id="settings">
      <div class="setting-group">
        <label>Key</label>
        <select id="key-select"></select>
      </div>
      <div class="setting-group">
        <label>Scale</label>
        <select id="scale-select"></select>
      </div>
      <div class="setting-group">
        <label>Chord</label>
        <div id="chord-type-btns">
          <button class="type-btn active" data-type="triad">Triad</button>
          <button class="type-btn" data-type="7th">7th</button>
        </div>
      </div>
    </section>
    <div class="ctrl-sep"></div>
    <div id="mode-bar">
      <label>Mode</label>
      <button class="mode-btn active" data-mode="random">Random</button>
      <button class="mode-btn" data-mode="sequential">1 → 7</button>
      <button class="mode-btn" data-mode="251">ii-V-I</button>
      <button class="mode-btn" data-mode="251-all">ii-V-I All Keys</button>
    </div>
  </div>

  <div id="main-columns">
    <!-- LEFT: Circle of Fifths + Scale Ref -->
    <div id="col-left">
      <section id="cof-section">
        <svg id="cof-svg" width="360" height="360" viewBox="0 0 360 360"></svg>
      </section>
      <section id="scale-ref-section">
        <div id="scale-ref-header">
          <span class="sr-title">Scale</span>
          <div class="tog-row"><span class="tog-label">Highlight</span><div id="scale-ref-toggle" class="tog on"></div></div>
        </div>
        <div id="scale-ref"></div>
      </section>
    </div>

    <!-- CENTER: Question + Feedback -->
    <div id="col-center">
      <section id="question-area">
        <div id="scale-label"></div>
        <div id="prev-preview"></div>
        <div id="roman-numeral"><span class="rn-numeral" style="color:#ccc">—</span></div>
        <div id="next-preview"></div>
        <div id="action-btns">
          <button id="prev-btn" onclick="goToPrev()">Prev</button>
          <button id="show-btn" onclick="showAnswer()">Show Answer</button>
          <button id="next-btn" onclick="nextQuestion()">Next (Space)</button>
        </div>
        <div id="answer-display"></div>
      </section>
      <section id="feedback-area">
        <div id="feedback"></div>
        <div id="score"></div>
      </section>
      <div id="held-notes"></div>
      <section id="stats-section">
        <div class="tog-row"><span class="tog-label">Reaction Time</span><div id="stats-toggle" class="tog on"></div></div>
        <div id="stats-bars"></div>
      </section>
    </div>

    <!-- RIGHT: Voicing Guide -->
    <div id="col-right">
      <section id="voicing-section">
        <div id="voicing-toggles"></div>
        <div id="voicing-pianos"></div>
      </section>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
